canonicalizacion:
  dialects:
    mysql:      "8.0"
    postgresql: "15"

  tables:
    titanic:
      columns:
        fare:
          type:      numeric
          precision: 3
          scale:     10
          nullable:  true
          information_loss: >
            Se pierden los dígitos a partir del cuarto decimal.
            Afecta a 24 pasajeros con precios como 10.4625,
            truncados de forma distinta entre MySQL FLOAT
            y PostgreSQL DOUBLE PRECISION.
          dialects:
            mysql:      "ROUND(CAST({col} AS DECIMAL(10,3)), 3)"
            postgresql: "ROUND({col}::NUMERIC(10,3), 3)"

        name:
          type:     text
          nullable: false
          information_loss: >
            Se pierde la distinción entre mayúsculas y minúsculas.
            La normalización NFC unifica representaciones Unicode
            equivalentes pero preserva caracteres especiales.
          transformations:
            - trim
            - lowercase
            - unicode_nfc
          dialects:
            mysql:      "LOWER(TRIM(CONVERT({col} USING utf8mb4)))"
            postgresql: "LOWER(TRIM(NORMALIZE({col}, NFC)))"

        sex:
          type:     text
          nullable: true
          information_loss: >
            Se pierde la distinción de mayúsculas. Sin pérdida
            semántica para valores bien formados (male/female).
          transformations:
            - trim
            - lowercase
          dialects:
            mysql:      "LOWER(TRIM({col}))"
            postgresql: "LOWER(TRIM({col}))"

        survived:
          type:     boolean
          nullable: false
          information_loss: >
            Representación normalizada a 0/1. Sin pérdida semántica
            para valores bien formados.

        cabin:
          type:     text
          nullable: true
          information_loss: >
            Se pierde la distinción de mayúsculas y los espacios
            extremos. COALESCE normaliza NULL y cadena vacía
            al mismo valor.
          transformations:
            - trim
            - lowercase
          dialects:
            mysql:      "LOWER(TRIM(COALESCE({col}, '')))"
            postgresql: "LOWER(TRIM(COALESCE({col}, '')))"